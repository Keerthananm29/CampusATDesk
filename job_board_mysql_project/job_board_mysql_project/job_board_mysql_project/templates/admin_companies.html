{% extends 'base.html' %}

{% block content %}
<h1>Companies</h1>
<a href="{{ url_for('admin_add_company') }}">Add Company</a>
<table>
    <tr><th>ID</th><th>Name</th><th>Actions</th></tr>
    {% for c in companies %}
    <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>
            <a href="{{ url_for('admin_edit_company', company_id=c.id) }}">Edit</a>
            <form method="POST" action="{{ url_for('admin_delete_company', company_id=c.id) }}" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
