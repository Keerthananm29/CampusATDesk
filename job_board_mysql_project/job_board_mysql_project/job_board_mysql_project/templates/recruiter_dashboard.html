{% extends 'base.html' %}

{% block content %}
<h1>Recruiter Dashboard</h1>

<div class="card">
    <h3>Your Jobs</h3>

    {% if jobs %}
        {% for job in jobs %}
            <div class="job-card">
                <h4>{{ job.title }}</h4>
                <p><strong>Company:</strong> {{ job.company }}</p>
                <p><strong>Applicants:</strong> {{ job.applications|length }}</p>
                <a href="{{ url_for('view_job_applications', job_id=job.id) }}"><button>View Applications</button></a>
                <form method="POST" action="{{ url_for('delete_job', job_id=job.id) }}" onsubmit="return confirm('Delete this job?');" style="display:inline">
                    <button type="submit">Delete</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>You haven't posted any jobs yet.</p>
    {% endif %}

    <a href="{{ url_for('create_job') }}"><button>Post New Job</button></a>
</div>

{% endblock %}
